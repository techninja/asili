<!DOCTYPE html>
<html>
<head>
    <title>Multi-Format Risk Calculation Test</title>
</head>
<body>
    <h1>Multi-Format Risk Calculation Test</h1>
    <div id="test-results"></div>
    
    <script type="module">
        // Test the new trait manifest structure
        const testManifest = {
            "traits": {
                "MONDO:0000400": {
                    "name": "diabetes mellitus",
                    "description": "Polygenic risk score for diabetes mellitus",
                    "categories": ["Metabolic Disorders", "Other Conditions"],
                    "variant_count": 4786729,
                    "file_path": "MONDO_0000400_hg38.parquet",
                    "pgs_metadata": {
                        "PGS001327": {
                            "name": "GBE_HC221",
                            "trait": "Diabetes",
                            "ancestry": ""
                        },
                        "PGS001329": {
                            "name": "GBE_HC652",
                            "trait": "Unspecified diabetes mellitus (time-to-event)",
                            "ancestry": ""
                        }
                    },
                    "last_updated": "2026-01-03T22:17:13.248Z"
                },
                "MONDO:0001645": {
                    "name": "coronary artery disease",
                    "description": "Polygenic risk score for coronary artery disease",
                    "categories": ["Cardiovascular Disease"],
                    "variant_count": 3245891,
                    "file_path": "MONDO_0001645_hg38.parquet",
                    "pgs_metadata": {
                        "PGS000010": {
                            "name": "CAD_metaGRS",
                            "trait": "Coronary artery disease",
                            "ancestry": "European"
                        }
                    },
                    "last_updated": "2026-01-03T22:17:13.248Z"
                }
            },
            "generated_at": "2026-01-03T22:17:13.248Z"
        };
        
        function testTraitConversion() {
            const availableTraits = [];
            const categories = new Set();
            
            // Process traits directly from the keyed structure
            Object.entries(testManifest.traits).forEach(([mondoId, trait]) => {
                availableTraits.push({
                    id: mondoId,
                    name: trait.name,
                    description: trait.description,
                    categories: trait.categories,
                    variant_count: trait.variant_count,
                    file_path: trait.file_path,
                    pgs_count: Object.keys(trait.pgs_metadata).length
                });
                
                trait.categories?.forEach(cat => categories.add(cat));
            });
            
            const results = document.getElementById('test-results');
            results.innerHTML = `
                <h2>Available Categories:</h2>
                <ul>${Array.from(categories).map(cat => `<li>${cat}</li>`).join('')}</ul>
                
                <h2>Traits by Category:</h2>
                ${Array.from(categories).map(category => `
                    <h3>${category}</h3>
                    <ul>
                        ${availableTraits
                            .filter(trait => trait.categories.includes(category))
                            .map(trait => `
                                <li>
                                    <strong>${trait.name}</strong> (${trait.id})<br>
                                    ${trait.description}<br>
                                    <em>${trait.variant_count.toLocaleString()} variants, ${trait.pgs_count} PGS scores</em>
                                </li>
                            `).join('')}
                    </ul>
                `).join('')}
                
                <h2>Raw Trait Data:</h2>
                <pre>${JSON.stringify(availableTraits, null, 2)}</pre>
            `;
        }
        
        testTraitConversion();
    </script>
</body>
</html>
