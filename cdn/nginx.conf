events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    server {
        listen 80;
        server_name localhost;

        # Serve built deps from container
        location /deps {
            alias /usr/share/nginx/html/app/deps;
            
            location ~* \.(m?js|mjs)$ {
                add_header Content-Type application/javascript;
            }
            
            add_header 'Access-Control-Allow-Origin' '*' always;
        }

        # Handle favicon specifically
        location = /favicon.ico {
            return 204;
            access_log off;
            log_not_found off;
        }

        # Serve dev files from host mount
        location / {
            root /usr/share/nginx/html/dev;
            index index.html;
            try_files $uri $uri/ /index.html;
            
            location ~* \.(m?js|mjs)$ {
                add_header Content-Type application/javascript;
            }
            
            add_header 'Access-Control-Allow-Origin' '*' always;
        }
        
        # Serve packages directory
        location /packages {
            alias /usr/share/nginx/html/packages;
            
            location ~* \.m?js$ {
                add_header Content-Type application/javascript;
            }
            
            add_header 'Access-Control-Allow-Origin' '*' always;
        }
        
        # Serve lib directory
        location /lib {
            alias /usr/share/nginx/html/dev/lib;
            
            location ~* \.m?js$ {
                add_header Content-Type application/javascript;
            }
            
            add_header 'Access-Control-Allow-Origin' '*' always;
        }
        
        # Proxy calculation server API
        location /api/ {
            proxy_pass http://localhost:5252/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # Serve data files from /data with Range Request support
        location /data {
            alias /usr/share/nginx/html/data;
            autoindex on;

            # Enable Range Requests for parquet streaming
            add_header 'Accept-Ranges' 'bytes' always;
            
            # CORS Headers
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Range, Content-Type' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length, Content-Range, Accept-Ranges' always;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Range, Content-Type';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
        }
    }
}
