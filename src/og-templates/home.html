<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px; height: 630px; overflow: hidden;
  font-family: "Montserrat", -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg, #0f172a 0%, #1a1040 50%, #1e293b 100%);
  color: #e2e8f0; position: relative;
  display: flex; align-items: center; justify-content: center;
}
canvas {
  position: absolute; inset: 0; width: 100%; height: 100%;
}
.card {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 24px; text-align: center;
  position: relative; z-index: 1;
}
.logo img { width: 140px; height: 140px; }
.title { font-size: 50px; font-weight: 800; line-height: 1.1; }
.title span { color: #818cf8; }
.subtitle { font-size: 22px; line-height: 1.4; color: #a8b8cc; max-width: 740px; }
.stats { display: flex; gap: 48px; margin-top: 4px; }
.stat { display: flex; flex-direction: column; gap: 4px; }
.stat-value { font-size: 30px; font-weight: 700; color: #818cf8; }
.stat-label { font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; color: #a8b8cc; }
.badge {
  font-size: 13px; text-transform: uppercase; letter-spacing: 2px;
  color: #34d399; font-weight: 600; padding: 8px 20px;
  background: rgba(52,211,153,0.08);
  border: 1px solid rgba(52,211,153,0.25); border-radius: 20px;
}
</style></head>
<body>
<canvas id="c" width="1200" height="630"></canvas>
<div class="card">
  <div class="logo"><img src="/logo.svg"></div>
  <div class="title"><span>Asili</span> — Polygenic Scores</div>
  <div class="subtitle">{description}</div>
  <div class="stats">
    <div class="stat"><div class="stat-value">64</div><div class="stat-label">Traits</div></div>
    <div class="stat"><div class="stat-value">1,690</div><div class="stat-label">PGS Models</div></div>
    <div class="stat"><div class="stat-value">100%</div><div class="stat-label">In-browser</div></div>
  </div>
  <div class="badge">No servers · No accounts · Your data stays yours</div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 1200, H = 630, COUNT = 100, DIST = 150;
const particles = Array.from({length: COUNT}, () => ({
  x: Math.random() * W, y: Math.random() * H,
  vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.5,
  r: Math.random() * 2.5 + 1
}));
for (let frame = 0; frame < 60; frame++) {
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0 || p.x > W) p.vx *= -1;
    if (p.y < 0 || p.y > H) p.vy *= -1;
  }
}
ctx.clearRect(0, 0, W, H);
for (let i = 0; i < COUNT; i++) {
  for (let j = i + 1; j < COUNT; j++) {
    const dx = particles[i].x - particles[j].x;
    const dy = particles[i].y - particles[j].y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < DIST) {
      ctx.beginPath();
      ctx.moveTo(particles[i].x, particles[i].y);
      ctx.lineTo(particles[j].x, particles[j].y);
      ctx.strokeStyle = `rgba(129,140,248,${0.25 * (1 - dist/DIST)})`;
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  }
}
for (const p of particles) {
  ctx.beginPath();
  ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(129,140,248,0.7)';
  ctx.fill();
}
</script>
</body></html>
