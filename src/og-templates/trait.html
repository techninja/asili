<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 1200px;
        height: 630px;
        overflow: hidden;
        font-family:
          'Montserrat',
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        position: relative;
      }
      .bg-image {
        position: absolute;
        top: 0;
        right: 0;
        width: 500px;
        height: 100%;
        object-fit: cover;
        object-position: center;
      }
      .bg-fade {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to right,
          #0f172a 54%,
          rgba(15, 23, 42, 0.97) 64%,
          rgba(15, 23, 42, 0.6) 78%,
          rgba(15, 23, 42, 0.2) 100%
        );
      }
      .bg-gradient {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          rgba(26, 16, 64, 0.95) 0%,
          rgba(26, 16, 64, 0.4) 40%,
          transparent 70%
        );
      }
      .glow {
        position: absolute;
        width: 400px;
        height: 400px;
        border-radius: 50%;
        filter: blur(100px);
        opacity: 0.12;
        background: #818cf8;
        top: -100px;
        left: -80px;
      }
      .logo {
        position: absolute;
        bottom: 44px;
        left: 60px;
        z-index: 2;
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .logo img {
        width: 64px;
        height: 64px;
      }
      .logo-text {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      .logo-name {
        font-size: 28px;
        font-weight: 700;
        color: #e2e8f0;
      }
      .logo-sub {
        font-size: 16px;
        color: #a8b8cc;
      }
      .content {
        position: relative;
        z-index: 1;
        padding: 130px 60px 120px;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 20px;
        max-width: 820px;
      }
      .emoji {
        position: absolute;
        top: 44px;
        left: 60px;
        z-index: 2;
        font-size: 64px;
        line-height: 1;
      }
      .title {
        font-size: 72px;
        font-weight: 800;
        line-height: 1.05;
        color: #e2e8f0;
      }
      .description {
        font-size: 26px;
        line-height: 1.4;
        color: #a8b8cc;
      }
      .stats {
        display: flex;
        gap: 36px;
        margin-top: 8px;
      }
      .stat {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .stat-value {
        font-size: 34px;
        font-weight: 700;
        color: #818cf8;
      }
      .stat-label {
        font-size: 15px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #a8b8cc;
      }
    </style>
  </head>
  <body>
    <img class="bg-image" src="{image}" />
    <div class="bg-fade"></div>
    <div class="bg-gradient"></div>
    <div class="glow"></div>
    <div class="logo">
      <img src="/logo.svg" />
      <div class="logo-text">
        <span class="logo-name">Asili</span>
        <span class="logo-sub">Privacy-first polygenic scores</span>
      </div>
    </div>
    <div class="emoji">{emoji}</div>
    <div class="content">
      <div class="title">{name}</div>
      <div class="description">{description}</div>
      <div class="stats">
        <div class="stat">
          <div class="stat-value">{pgs_count}</div>
          <div class="stat-label">PGS Models</div>
        </div>
        <div class="stat">
          <div class="stat-value">{variantsFormatted}</div>
          <div class="stat-label">Variants</div>
        </div>
        <div class="stat">
          <div class="stat-value">{uniqueFormatted}</div>
          <div class="stat-label">Unique SNPs</div>
        </div>
      </div>
    </div>
  </body>
</html>
