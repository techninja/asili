services:
  # Build deps in container, mount dev files
  webapp:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    volumes:
      - ./cdn/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./apps/web:/usr/share/nginx/html/dev
      - ./packages:/usr/share/nginx/html/packages
      - ./data_out:/usr/share/nginx/html/data
    ports:
      - "4242:80"

  # The Data Pipeline (ETL)
  pipeline:
    build: 
      context: ./packages/pipeline
      dockerfile: Dockerfile
    volumes:
      - ./packages/pipeline:/app
      - /app/node_modules
      - ./data_out:/output
      - ./cache:/cache
