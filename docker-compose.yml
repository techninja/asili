services:
  # 1. The Frontend Application
  webapp:
    build: 
      context: ./apps/web
      dockerfile: Dockerfile
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    ports:
      - "4242:8080"
    depends_on:
      - cdn

  # 2. The Data Pipeline (ETL)
  pipeline:
    build: 
      context: ./packages/pipeline
      dockerfile: Dockerfile
    volumes:
      - ./packages/pipeline:/app
      - /app/node_modules
      - ./data_out:/output
      - ./cache:/cache

  # 3. The Local CDN (Simulating S3)
  cdn:
    image: nginx:alpine
    volumes:
      - ./cdn/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./data_out:/usr/share/nginx/html/data
    ports:
      - "4343:80"
