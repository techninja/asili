services:
  # Static webapp (browser-only processing)
  webapp:
    image: nginx:alpine
    container_name: asili-webapp
    ports:
      - '4242:80'
    volumes:
      - ./apps/web:/usr/share/nginx/html/apps/web:ro
      - ./packages:/usr/share/nginx/html/packages:ro
      - ./data_out:/usr/share/nginx/html/data:ro
    restart: unless-stopped

  # The Data Pipeline (ETL)
  pipeline:
    build:
      context: .
      dockerfile: ./packages/pipeline/Dockerfile
    deploy:
      resources:
        limits:
          memory: 12G
        reservations:
          memory: 8G
    volumes:
      - ./packages/pipeline:/app/packages/pipeline
      - ./packages/core:/app/packages/core
      - /app/packages/pipeline/node_modules
      - /app/packages/core/node_modules
      - ./data_out:/output
      - ./cache:/cache
