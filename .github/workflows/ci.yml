name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Node tests
        run: node --test 'src/{store,utils}/**/*.test.js' 'packages/core/**/*.test.js'

      - name: Lint (ESLint)
        run: pnpm exec eslint src/ --max-warnings 0
        continue-on-error: true

      - name: Lint (Stylelint)
        run: pnpm exec stylelint "src/**/*.css" --max-warnings 0
        continue-on-error: true
