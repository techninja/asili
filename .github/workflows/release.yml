name: Release from Dev

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'minor'
        type: choice
        options:
          - patch
          - minor
          - major
      custom_version:
        description: 'Custom version (leave empty to auto-bump)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: 🚀 Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run tests
        run: node --test 'src/{store,utils}/**/*.test.js' 'packages/core/**/*.test.js'

      - name: Compute version
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          if [ -n "${{ inputs.custom_version }}" ]; then
            NEW="${{ inputs.custom_version }}"
          else
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            case "${{ inputs.bump }}" in
              major) NEW="$((MAJOR+1)).0.0" ;;
              minor) NEW="${MAJOR}.$((MINOR+1)).0" ;;
              patch) NEW="${MAJOR}.${MINOR}.$((PATCH+1))" ;;
            esac
          fi
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "new=$NEW" >> $GITHUB_OUTPUT
          echo "🏷️ Releasing: $CURRENT → $NEW"

      - name: Bump version in package.json
        run: |
          node -e "
            const pkg = JSON.parse(require('fs').readFileSync('package.json','utf8'));
            pkg.version = '${{ steps.version.outputs.new }}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "release: v${{ steps.version.outputs.new }}"
          git push origin dev

      - name: Merge dev → main
        run: |
          git checkout main
          git pull origin main
          git merge dev --no-edit
          git push origin main

      - name: Create tag
        run: |
          git tag "v${{ steps.version.outputs.new }}"
          git push origin "v${{ steps.version.outputs.new }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.new }}
          name: v${{ steps.version.outputs.new }}
          generate_release_notes: true
